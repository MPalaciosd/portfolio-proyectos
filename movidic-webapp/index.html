<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Tasación de Vivienda - Movidic</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        h1 { text-align: center; color: #0078d4; margin-bottom: 25px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input[type="submit"] { background-color: #0078d4; color: white; padding: 12px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        input[type="submit"]:hover { background-color: #005a9e; }
        .seccion { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 Registro de Tasación Movidic</h1>
        
        <form method="POST" action="/guardar-datos">
            
            <div class="seccion">
                <h2>1. Datos Principales (Requeridos)</h2>
                
                <label for="AreaTotalM2">Área Total Construida (m²):</label>
                <input type="number" step="0.01" name="AreaTotalM2" required>

                <label for="NumDormitorios">Número de Dormitorios:</label>
                <input type="number" name="NumDormitorios" min="0" required>

                <label for="NumBanyos">Número de Baños:</label>
                <input type="number" name="NumBanyos" min="0" required>
                
                <label for="PrecioFinal">Precio Final de Venta (€):</label>
                <input type="number" step="0.01" name="PrecioFinal" required>
            </div>

            <div class="seccion">
                <h2>2. Características Adicionales</h2>

                <label for="AntiguedadAnios">Antigüedad (Años):</label>
                <input type="number" name="AntiguedadAnios" min="0">

                <label for="ZonaClave">Zona/Barrio:</label>
                <input type="text" name="ZonaClave">

                <label for="EstadoConservacion">Estado de Conservación:</label>
                <select name="EstadoConservacion">
                    <option value="">-- Seleccionar --</option>
                    <option value="Nuevo">Nuevo</option>
                    <option value="Bueno">Buen estado</option>
                    <option value="A reformar">A reformar</option>
                </select>

                <label for="TieneAscensor">¿Tiene Ascensor?</label>
                <select name="TieneAscensor">
                    <option value="1">Sí</option>
                    <option value="0">No</option>
                </select>

                <label for="MetodoPago">Método de Pago:</label>
                <input type="text" name="MetodoPago" placeholder="Ej: Hipoteca, Contado">
            </div>

            <div class="seccion">
                <h2>3. Auditoría</h2>
                <label for="GuardadoPor">Registrado por (Tu Usuario):</label>
                <input type="text" name="GuardadoPor" required>
            </div>

            <input type="submit" value="Guardar Datos en Azure SQL">
        </form>
    </div>
</body>
</html>
