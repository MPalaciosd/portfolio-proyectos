<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secretario IA — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:       #1a9b8c;
      --teal-light: #e6f5f3;
      --teal-dark:  #147a6e;
      --bg:         #f4f6f8;
      --sidebar-bg: #0f2b2a;
      --card:       #ffffff;
      --text:       #1a1f2e;
      --muted:      #7a8394;
      --border:     #e4e8ee;
      --work:       #e8f4ff;
      --work-text:  #1a6bbf;
      --mkt:        #fff3e8;
      --mkt-text:   #bf6a1a;
      --social:     #fde8f0;
      --social-text:#bf1a5a;
      --finance:    #f5e8ff;
      --finance-text:#7a1abf;
      --hr:         #e8ffe8;
      --hr-text:    #1abf4a;
      --dot-work:   #4a9eff;
      --dot-mkt:    #ff8c42;
      --dot-social: #ff4a8c;
      --dot-finance:#c84aff;
      --dot-hr:     #4aff7a;
      --dot-default:#aaa;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 200px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      gap: 4px;
      flex-shrink: 0;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 24px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
    }

    .sidebar-logo .icon-box {
      width: 32px; height: 32px;
      background: var(--teal);
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 16px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: #8ba3a2;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      border-radius: 0;
      transition: all .18s;
      text-decoration: none;
    }

    .nav-item:hover { color: #fff; background: rgba(255,255,255,.06); }
    .nav-item.active { color: #fff; background: rgba(26,155,140,.25); border-left: 3px solid var(--teal); }

    .nav-item svg { opacity: .7; flex-shrink: 0; }
    .nav-item.active svg { opacity: 1; }

    .sidebar-bottom {
      margin-top: auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1px solid rgba(255,255,255,.08);
    }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--teal);
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }

    .user-info { overflow: hidden; }
    .user-name { font-size: 13px; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-email { font-size: 11px; color: #8ba3a2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ─── MAIN ─── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ─── EVENTS PANEL ─── */
    .events-panel {
      flex: 1;
      padding: 28px 24px;
      overflow-y: auto;
      min-width: 0;
    }

    .panel-header {
      margin-bottom: 20px;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .panel-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 3px;
    }

    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }

    .filter-btn:hover { border-color: var(--teal); color: var(--teal); }

    .filter-btn.active {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
    }

    .events-list { display: flex; flex-direction: column; gap: 12px; }

    .event-card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px 18px;
      border: 1px solid var(--border);
      transition: box-shadow .2s, transform .2s;
    }

    .event-card:hover {
      box-shadow: 0 4px 18px rgba(0,0,0,.07);
      transform: translateY(-1px);
    }

    .event-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .event-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .event-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .event-name { font-size: 14px; font-weight: 600; }

    .tag {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .tag-Work     { background: var(--work);    color: var(--work-text); }
    .tag-Marketing{ background: var(--mkt);     color: var(--mkt-text); }
    .tag-Social   { background: var(--social);  color: var(--social-text); }
    .tag-Finance  { background: var(--finance); color: var(--finance-text); }
    .tag-HR       { background: var(--hr);      color: var(--hr-text); }

    .event-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 12px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .event-footer {
      display: flex;
      gap: 8px;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text);
      font-weight: 500;
    }

    .pill svg { color: var(--teal); }

    /* ─── AI PANEL ─── */
    .ai-panel {
      width: 380px;
      flex-shrink: 0;
      background: var(--card);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 0 0;
    }

    .ai-header {
      padding: 0 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .ai-title { font-size: 18px; font-weight: 600; }
    .ai-subtitle { font-size: 13px; color: var(--muted); margin-top: 3px; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 85%;
      font-size: 13.5px;
      line-height: 1.5;
    }

    .msg-bot {
      align-self: flex-start;
      background: var(--bg);
      border-radius: 16px 16px 16px 4px;
      padding: 12px 14px;
      color: var(--text);
    }

    .msg-user {
      align-self: flex-end;
      background: var(--teal);
      color: #fff;
      border-radius: 16px 16px 4px 16px;
      padding: 12px 14px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
    }

    .msg-bot .msg-time { text-align: left; }
    .msg-user .msg-time { text-align: right; color: rgba(255,255,255,.7); }

    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 14px;
      background: var(--bg);
      border-radius: 16px 16px 16px 4px;
      align-self: flex-start;
    }

    .typing span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce .9s infinite;
    }

    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }

    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    .chat-input-area {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    .chat-input {
      flex: 1;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 24px;
      font-size: 13.5px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      color: var(--text);
      background: var(--bg);
      transition: border-color .15s;
    }

    .chat-input:focus { border-color: var(--teal); background: #fff; }

    .send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--teal);
      border: none;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background .15s, transform .1s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: var(--teal-dark); transform: scale(1.05); }
    .send-btn:active { transform: scale(.95); }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* ─── LOADING STATE ─── */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,43,42,.85);
      z-index: 999;
      place-items: center;
    }

    .loading-overlay.show { display: grid; }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── ANIMATIONS ─── */
    .event-card { animation: fadeUp .3s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="icon-box">🤖</div>
    Dashboard
  </div>

  <a class="nav-item" href="#">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    Profile
  </a>
  <a class="nav-item active" href="#">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Events
  </a>
  <a class="nav-item" href="#">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Calendar
  </a>
  <a class="nav-item" href="#">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 1 0 21 12"/></svg>
    Settings
  </a>
  <a class="nav-item" href="#">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Privacy Policy
  </a>

  <div class="sidebar-bottom">
    <div class="avatar" id="avatarInitials">JD</div>
    <div class="user-info">
      <div class="user-name" id="userName">John Doe</div>
      <div class="user-email" id="userEmail">john@example.com</div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">

  <!-- EVENTS PANEL -->
  <section class="events-panel">
    <div class="panel-header">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div class="panel-title">Upcoming Events</div>
          <div class="panel-subtitle" id="eventCount">Loading events...</div>
        </div>
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#1a9b8c" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="All">All</button>
      <button class="filter-btn" data-filter="Work">Work</button>
      <button class="filter-btn" data-filter="Marketing">Marketing</button>
      <button class="filter-btn" data-filter="Social">Social</button>
      <button class="filter-btn" data-filter="Finance">Finance</button>
      <button class="filter-btn" data-filter="HR">HR</button>
    </div>

    <div class="events-list" id="eventsList">
      <!-- Events rendered here -->
    </div>
  </section>

  <!-- AI PANEL -->
  <aside class="ai-panel">
    <div class="ai-header">
      <div class="ai-title">AI Assistant</div>
      <div class="ai-subtitle">Chat with your intelligent agent</div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="msg msg-bot">
        Hello! I'm your AI assistant. How can I help you today?
        <div class="msg-time" id="initTime"></div>
      </div>
    </div>

    <div class="chat-input-area">
      <input
        class="chat-input"
        id="chatInput"
        type="text"
        placeholder="Type your message..."
        autocomplete="off"
      />
      <button class="send-btn" id="sendBtn" title="Send">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </aside>

</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<script>
  // ─── UTILS ───────────────────────────────────────
  const DOT_COLORS = {
    Work:      'var(--dot-work)',
    Marketing: 'var(--dot-mkt)',
    Social:    'var(--dot-social)',
    Finance:   'var(--dot-finance)',
    HR:        'var(--dot-hr)',
  };

  function nowTime() {
    return new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
  }

  document.getElementById('initTime').textContent = nowTime();

  // ─── EVENTS ──────────────────────────────────────
  let allEvents = [];
  let activeFilter = 'All';

  async function loadEvents() {
    try {
      const r = await fetch('/api/eventos');
      const data = await r.json();
      allEvents = data.eventos || [];
      document.getElementById('eventCount').textContent =
        `${allEvents.length} event${allEvents.length !== 1 ? 's' : ''} scheduled`;
      renderEvents();
    } catch (e) {
      document.getElementById('eventCount').textContent = 'Error loading events';
      document.getElementById('eventsList').innerHTML =
        '<p style="color:var(--muted);font-size:13px;padding:8px 0;">Could not load events. Check server connection.</p>';
    }
  }

  function renderEvents() {
    const list = document.getElementById('eventsList');
    const filtered = activeFilter === 'All'
      ? allEvents
      : allEvents.filter(e => (e.categoria || e.category || 'Work') === activeFilter);

    if (!filtered.length) {
      list.innerHTML = '<p style="color:var(--muted);font-size:13px;padding:8px 0;">No events in this category.</p>';
      return;
    }

    list.innerHTML = filtered.map((e, i) => {
      const cat   = e.categoria || e.category || 'Work';
      const name  = e.nombre_evento || e.name || 'Event';
      const fecha = e.fecha || e.date || '';
      const hora  = e.hora  || e.time || '';
      const lugar = e.lugar || e.location || '';
      const eta   = e.eta   || '–';
      const km    = e.distancia || e.distance || '–';
      const dot   = DOT_COLORS[cat] || 'var(--dot-default)';

      return `
        <div class="event-card" style="animation-delay:${i * 0.05}s">
          <div class="event-top">
            <div class="event-name-row">
              <div class="event-dot" style="background:${dot}"></div>
              <span class="event-name">${name}</span>
            </div>
            <span class="tag tag-${cat}">${cat}</span>
          </div>
          <div class="event-meta">
            ${fecha || hora ? `
            <div class="meta-row">
              <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
              ${fecha}${hora ? ' · ' + hora : ''}
            </div>` : ''}
            ${lugar ? `
            <div class="meta-row">
              <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              ${lugar}
            </div>` : ''}
          </div>
          <div class="event-footer">
            <div class="pill">
              <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              ETA ${eta} min
            </div>
            <div class="pill">
              <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
              ${km} km
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderEvents();
    });
  });

  // ─── CHAT ────────────────────────────────────────
  const chatMessages = document.getElementById('chatMessages');
  const chatInput    = document.getElementById('chatInput');
  const sendBtn      = document.getElementById('sendBtn');

  function appendMsg(text, role) {
    const div = document.createElement('div');
    div.className = `msg msg-${role}`;
    div.innerHTML = `${text}<div class="msg-time">${nowTime()}</div>`;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;

    chatInput.value = '';
    sendBtn.disabled = true;
    appendMsg(text, 'user');
    showTyping();

    try {
      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await r.json();
      removeTyping();
      appendMsg(data.reply || '⚠️ No response', 'bot');
    } catch (e) {
      removeTyping();
      appendMsg('⚠️ Connection error. Is the server running?', 'bot');
    } finally {
      sendBtn.disabled = false;
      chatInput.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  // ─── INIT ─────────────────────────────────────────
  loadEvents();
</script>
</body>
</html>
